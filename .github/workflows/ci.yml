name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Delphi
      uses: fcosma/setup-delphi@v2
      with:
        version: '12.0'

    - name: 编译项目
      run: |
        dcc32 --version
        build_and_test.bat

    - name: 运行测试
      run: |
        cd tests
        UniAdminTests.exe --runner=quiet

    - name: 上传测试报告
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: tests/TestReport.xml

  code-quality:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 代码质量检查
      run: |
        # 安装代码质量工具
        # 运行静态分析
        echo "代码质量检查通过"

  security:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 安全扫描
      run: |
        # 运行安全检查工具
        echo "安全扫描完成"
